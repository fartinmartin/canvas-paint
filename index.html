<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<link rel="stylesheet" href="/style.css" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>canvas-paint ⬝ demo</title>
	</head>
	<body>
		<header>
			<h1>canvas-paint ⬝ demo</h1>
		</header>

		<main>
			<aside>
				<div id="controls">
					<div class="history">
						<button onclick="demo.undo()" title="undo"><svg class="remix"><use href="/remixicon.symbol.svg#ri-arrow-go-back-line"></use></svg></button>
						<button onclick="demo.redo()" title="redo"><svg class="remix"><use href="/remixicon.symbol.svg#ri-arrow-go-forward-line"></use></svg></button>
					</div>
					<div class="mode">
						<button onclick="demo.brush.mode = `draw`" title="draw"><svg class="remix"><use href="/remixicon.symbol.svg#ri-pencil-line"></use></svg></button>
						<button onclick="demo.brush.mode = `erase`" title="erase"><svg class="remix"><use href="/remixicon.symbol.svg#ri-eraser-line"></use></svg></button>
						<button onclick="demo.brush.mode = `fill`" title="fill"><svg class="remix"><use href="/remixicon.symbol.svg#ri-paint-fill"></use></svg></button>
					</div>
					<div class="brush">
						<button onclick="demo.brush.size--" title="brush size -"><svg class="remix"><use href="/remixicon.symbol.svg#ri-brush-line"></use></svg><svg class="remix"><use href="/remixicon.symbol.svg#ri-subtract-line"></use></svg></button>
						<button onclick="demo.brush.size++" title="brush size +"><svg class="remix"><use href="/remixicon.symbol.svg#ri-brush-line"></use></svg><svg class="remix"><use href="/remixicon.symbol.svg#ri-add-line"></use></svg></button>
						<input onchange="updateBrushColor(this)" type="color" />
					</div>
					<div class="radius">
						<button onclick="demo.brush.radius--" title="radius -"><svg class="remix"><use href="/remixicon.symbol.svg#ri-radio-button-line"></use></svg><svg class="remix"><use href="/remixicon.symbol.svg#ri-subtract-line"></use></svg></button>
						<button onclick="demo.brush.radius++" title="radius +"><svg class="remix"><use href="/remixicon.symbol.svg#ri-radio-button-line"></use></svg><svg class="remix"><use href="/remixicon.symbol.svg#ri-add-line"></use></svg></button>
						<button onclick="demo.brush.lerpFactor -= 0.5" title="lerp factor -"><svg class="remix"><use href="/remixicon.symbol.svg#ri-speed-line"></use></svg><svg class="remix"><use href="/remixicon.symbol.svg#ri-subtract-line"></use></svg></button>
						<button onclick="demo.brush.lerpFactor += 0.5" title="lerp factor +"><svg class="remix"><use href="/remixicon.symbol.svg#ri-speed-line"></use></svg><svg class="remix"><use href="/remixicon.symbol.svg#ri-add-line"></use></svg></button>
					</div>
					<div class="tolerance">
						<button onclick="demo.brush.tolerance--" title="tolerance -"><svg class="remix"><use href="/remixicon.symbol.svg#ri-contrast-line"></use></svg><svg class="remix"><use href="/remixicon.symbol.svg#ri-subtract-line"></use></svg></button>
						<button onclick="demo.brush.tolerance++" title="tolerance +"><svg class="remix"><use href="/remixicon.symbol.svg#ri-contrast-line"></use></svg><svg class="remix"><use href="/remixicon.symbol.svg#ri-add-line"></use></svg></button>
					</div>
					<div class="remove">
						<button onclick="demo.clear()" title="clear"><svg class="remix"><use href="/remixicon.symbol.svg#ri-delete-bin-line"></use></svg></button>
						<button onclick="demo.destroy()" title="destroy"><svg class="remix"><use href="/remixicon.symbol.svg#ri-close-circle-line"></use></svg></button>
					</div>
					<div class="io">
						<!-- prettier-ignore -->
						<button onclick="localStorage.setItem('drawing', JSON.stringify(demo.save()))" title="save"><svg class="remix"><use href="/remixicon.symbol.svg#ri-save-line"></use></svg></button>
						<!-- prettier-ignore -->
						<button onclick="demo.load(JSON.parse(localStorage.getItem('drawing')))" title="load"><svg class="remix"><use href="/remixicon.symbol.svg#ri-folder-open-line"></use></svg></button>
						<button onclick="downloadImage()" title="download png"><svg class="remix"><use href="/remixicon.symbol.svg#ri-image-line"></use></svg></button>
						<button onclick="downloadVideo()" title="download webm"><svg class="remix"><use href="/remixicon.symbol.svg#ri-video-download-line"></use></svg></button>
						<button onclick="demo.drawHistory({ delay: 10 })" title="playback"><svg class="remix"><use href="/remixicon.symbol.svg#ri-play-line"></use></svg></button>
					</div>
					<div class="drawing">
						<input onchange="updateBgColor(this)" type="color" />
						<input onchange="updateWidth(this)" type="number" />
						<input onchange="updateHeight(this)" type="number" />
					</div>
					<div class="ui">
						<button onclick="png" title="toggle pointer"><svg class="remix"><use href="/remixicon.symbol.svg#ri-focus-3-line"></use></svg></button>
						<button onclick="png" title="toggle brush"><svg class="remix"><use href="/remixicon.symbol.svg#ri-brush-line"></use></svg></button>
						<button onclick="png" title="toggle center"><svg class="remix"><use href="/remixicon.symbol.svg#ri-focus-line"></use></svg></button>
						<button onclick="png" title="toggle chain"><svg class="remix"><use href="/remixicon.symbol.svg#ri-links-line"></use></svg></button>
					</div>
				</div>
			</aside>

			<section>
				<div id="app"></div>
				<table id="debug-table">
					<tbody id="debug"></tbody>
				</table>
			</section>
		</main>

		<script type="module">
			import { Paint } from "./src/index.ts";

			const root = document.getElementById("app");

			const demo = new Paint(root, {
				width: 400,
				height: 400,
				bgColor: "#ffffff", // "whitesmoke",
			});

			// @ts-ignore ⚠️ don't do this in production :)
			window.demo = demo;

			demo.events.on("resizing", () => console.log("resizing"));
			demo.events.on("resized", () => console.log("resized"));

			demo.events.on("start", () => console.log("start"));
			demo.events.on("draw", () => console.log("draw"));
			demo.events.on("end", () => console.log("end"));
			demo.events.on("leave", () => console.log("leave"));

			// Debug panel
			const debug = document.getElementById("debug");
			const fmt = (n) => n.toFixed(1);

			function updateDebug() {
				const pointer = demo.brush.lazy.getPointerCoordinates();
				const brush = demo.brush.lazy.getBrushCoordinates();
				const currentRadius = demo.brush.lazy.getRadius();
				const targetRadius = demo.brush.radius;

				debug.innerHTML = `
					<tr><th>pointer</th><td>${fmt(pointer.x)}, ${fmt(pointer.y)}</td></tr>
					<tr><th>brush</th><td>${fmt(brush.x)}, ${fmt(brush.y)}</td></tr>
					<tr><th>radius</th><td>${fmt(currentRadius)} / ${fmt(targetRadius)}</td></tr>
					<tr><th>lerpFactor</th><td>${fmt(demo.brush.lerpFactor)}</td></tr>
					<tr><th>drawing</th><td>${demo.brush.isDrawing}</td></tr>
				`.trim();

				requestAnimationFrame(updateDebug);
			}

			requestAnimationFrame(updateDebug);
		</script>

		<script>
			window.addEventListener("load", () => {
				const brush = document.querySelectorAll("input[type='color']")[0];
				const bg = document.querySelectorAll("input[type='color']")[1];
				brush.value = demo.brush.color;
				bg.value = demo.options.bgColor; // not guarenteed to be a hex value

				const width = document.querySelectorAll("input[type='number']")[0];
				const height = document.querySelectorAll("input[type='number']")[1];
				width.value = demo.options.width;
				height.value = demo.options.height;
			});

			const updateBrushColor = (target) => (demo.brush.color = target.value);
			const updateBgColor = (target) => (demo.options.bgColor = target.value);

			const updateWidth = (target) => (demo.options.width = target.value);
			const updateHeight = (target) => (demo.options.height = target.value);

			async function downloadImage() {
				const blob = await demo.toBlob();

				const downloadLink = document.createElement("a");
				downloadLink.href = window.URL.createObjectURL(blob);
				downloadLink.download = "canvas-paint.png";
				downloadLink.click();

				downloadLink.remove();
			}

			async function downloadVideo() {
				const blob = await demo.toVideo({ delay: 10 });

				const downloadLink = document.createElement("a");
				downloadLink.href = window.URL.createObjectURL(blob);
				downloadLink.download = "canvas-paint.webm";
				downloadLink.click();

				downloadLink.remove();
			}
		</script>

		<script>
			// console.log(APP_VERSION);
		</script>
	</body>
</html>
